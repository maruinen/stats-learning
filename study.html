<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習画面 - 統計学学習ツール</title>
    <link rel="stylesheet" href="style.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="data/items.js"></script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" class="nav-link">← 戻る</a>
        </nav>
        
        <div id="study-content">
            <h1 id="title">読み込み中...</h1>
            <p id="description"></p>

            <div class="study-item">
                <h3>確率分布の式 / 定義</h3>
                <div class="formula-box hidden" onclick="this.classList.toggle('hidden')">
                    <span id="formula"></span>
                </div>
            </div>

            <div id="additional-props">
                <!-- Mean, Variance, MGF will be here if distribution -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        function init() {
            if (typeof STATS_DATA === 'undefined') {
                console.error("STATS_DATA is not loaded.");
                return;
            }
            
            const item = [...STATS_DATA.distributions, ...STATS_DATA.functions].find(i => i.id === itemId);
            if (!item) {
                document.getElementById('title').innerText = "エラー: 項目が見つかりません。";
                return;
            }

            document.getElementById('title').innerText = item.name;
            document.getElementById('description').innerText = item.description;
            document.getElementById('formula').innerText = `\\( ${item.formula} \\)`;

            if (item.mean) {
                const props = document.getElementById('additional-props');
                const fields = [
                    { label: '期待値 (Mean)', value: item.mean },
                    { label: '分散 (Variance)', value: item.variance }
                ];
                
                if (item.pgf) {
                    fields.push({ label: '確率母関数 (PGF)', value: item.pgf });
                }
                if (item.mgf) {
                    fields.push({ label: 'モーメント母関数 (MGF)', value: item.mgf });
                }
                
                fields.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'study-item';
                    div.innerHTML = `
                        <h3>${f.label}</h3>
                        <div class="formula-box hidden" onclick="this.classList.toggle('hidden')">
                            <span>\\( ${f.value} \\)</span>
                        </div>
                    `;
                    props.appendChild(div);
                });
            }
            
            // Re-render MathJax
            if (window.MathJax) {
                window.MathJax.typeset();
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
